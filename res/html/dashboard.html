<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #dddbd4;
    --border-strong: #b8b5ac;
    --text: #1a1917;
    --text-muted: #6b6860;
    --text-faint: #a09d97;
    --accent: #1a1917;
    --danger: #b83232;
    --danger-bg: #fdf1f1;
    --danger-border: #f0c0c0;
    --blocked-bg: #fff8f0;
    --blocked-border: #f0d8b8;
    --blocked-text: #8a5a1a;
    --green: #1e6b3c;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 2rem;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.04em;
  }

  .header-left p,
  .header-right {
    display: none;
  }

  .summary-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.04);
  }

  .summary-card .summary-label {
    display: block;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .summary-card .summary-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  .summary-card.summary-total {
    border-color: #1e6b3c;
    background: rgba(30, 107, 60, 0.08);
  }

  .summary-card.summary-blocked {
    border-color: #b83232;
    background: rgba(184, 50, 50, 0.08);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    z-index: 20;
  }

  .modal-backdrop.visible { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: min(480px, 100%);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
  }

  .modal h2 {
    margin-bottom: 1rem;
    font-size: 20px;
  }

  .modal label {
    display: block;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--text-muted);
  }

  .modal input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-top: 6px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  .stats {
    display: none;
  }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .table-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .table-toolbar > span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .toolbar-right {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }

  .search-input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    width: 150px;
  }

  th.sortable {
    cursor: pointer;
    user-select: none;
  }

  th.sortable:hover {
    color: var(--accent);
  }

  th.sortable .sort-indicator {
    font-size: 12px;
    margin-left: 4px;
    color: var(--text-faint);
  }

  .btn-primary {
    background: var(--green);
    border-color: #18502e;
    color: white;
  }

  .btn-primary:hover {
    background: #1a8a4a;
    border-color: #166036;
    color: white;
  }

  .btn-large {
    padding: 12px 22px;
    font-size: 15px;
  }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-label input[type="checkbox"] {
    width: 13px;
    height: 13px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    font-weight: 400;
    padding: 10px 1.25rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    width: 25%;
  }

  thead th:nth-child(3) { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody tr.is-blocked { background: var(--blocked-bg); }

  td {
    padding: 11px 1.25rem;
    font-size: 13.5px;
    vertical-align: middle;
  }

  .user-name {
    font-weight: 500;
    font-size: 13.5px;
  }

  /* RFID shown as subtle subtext, hidden by default */
  .rfid-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 3px;
    display: none;
  }

  /* Toggle class on the table reveals all RFID lines at once */
  table.show-rfid .rfid-sub { display: block; }

  .spent-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .blocked-cell { text-align: center; }

  .gjeng-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .blocked-cell input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--danger);
    cursor: pointer;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: 8px;
    background: var(--blocked-bg);
    border: 1px solid var(--blocked-border);
    color: var(--blocked-text);
    vertical-align: middle;
  }

  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 0;
  }

  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }

  .btn:hover { background: var(--bg); border-color: var(--accent); }

  .btn-danger {
    background: var(--danger-bg);
    border-color: var(--danger-border);
    color: var(--danger);
  }

  .btn-danger:hover { background: #f9e5e5; border-color: var(--danger); }

  .confirm-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--danger);
  }

  .confirm-bar.visible { display: flex; }
  .confirm-bar strong { font-weight: 500; }

  .confirm-bar button {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--danger);
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
  }

  .confirm-bar .btn-confirm { background: var(--danger); color: white; }
  .confirm-bar .btn-cancel { background: transparent; color: var(--danger); }

  .viewing-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 1.25rem;
    background: rgba(30, 107, 60, 0.08);
    border-bottom: 1px solid #1e6b3c;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--green);
  }

  .viewing-banner.visible { display: flex; }

  .backup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .backup-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1.25rem;
    cursor: pointer;
    user-select: none;
  }

  .backup-toolbar:hover { background: var(--bg); }

  .backup-toolbar > span:first-child {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .backup-toolbar .backup-toggle-icon {
    font-size: 11px;
    color: var(--text-faint);
  }

  .backup-list { display: none; }
  .backup-list.open { display: block; border-top: 1px solid var(--border); }

  .backup-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .backup-item:last-child { border-bottom: none; }

  .backup-item-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .backup-item-actions { display: flex; gap: 8px; }

  .footer {
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-faint);
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Kriteliste Aqua</h1>
  </div>
  <div class="header-right">
    <button id="logout-btn" class="btn btn-secondary">Logg ut</button>
  </div>
</div>

<div class="summary-row">
  <div class="summary-card summary-total">
    <span class="summary-label">Antall brukere</span>
    <div class="summary-value">
      <span id="total-count">0</span>
    </div>
  </div>
  <div class="summary-card summary-blocked">
    <span class="summary-label">Svartlistede brukere</span>
    <div class="summary-value">
      <span id="blocked-count">0</span>
    </div>
  </div>
  <div class="toolbar-right" style="margin-left:auto; gap:10px; align-items:center;">
    <button class="btn btn-primary btn-large" id="load-data-btn" onclick="loadData()">Hent data</button>
    <button class="btn btn-primary" id="save-button" onclick="saveBlocked()" disabled>Eksporter data</button>
    <button class="btn" id="add-user-button" onclick="showAddUserDialog()" disabled>Legg til bruker</button>
  </div>
</div>

<div class="modal-backdrop" id="add-user-modal">
  <div class="modal">
    <h2>Legg til bruker</h2>
    <label>
      Navn
      <input id="new-user-name" type="text" placeholder="Navn" />
    </label>
    <label>
      RFID
      <input id="new-user-rfid" type="text" placeholder="RFID" />
    </label>
    <label>
      Gjeng
      <input id="new-user-gjeng" type="text" placeholder="Gjeng (valgfritt)" />
    </label>
    <div class="modal-actions">
      <button class="btn" type="button" onclick="hideAddUserDialog()">Avbryt</button>
      <button class="btn btn-primary" type="button" onclick="submitAddUser()">Legg til</button>
    </div>
  </div>
</div>

<div class="table-card" id="table-card">
  <div class="viewing-banner" id="viewing-banner">
    <span id="viewing-banner-text"></span>
    <button class="btn" style="font-size:11px; padding:3px 10px;" onclick="clearBackupView()">Tilbake til live data</button>
  </div>
  <div class="table-toolbar">
    <span id="data-label">users — data.csv (not loaded)</span>
    <div class="toolbar-right">
      <input type="text" class="search-input" id="search-input" placeholder="Søk navn..." oninput="setSearch(this.value)">
      <label class="toggle-label">
        <input type="checkbox" id="show-rfid-toggle" onchange="toggleRfid(this)">
        Vis RFID
      </label>
      <a id="export-link" href="/download" style="font-size:12px; font-family:'IBM Plex Mono',monospace; color:var(--text-muted); text-decoration:none;">&#x2193; Last ned data</a>
    </div>
  </div>
  <table id="main-table">
    <thead>
      <tr>
        <th class="sortable" onclick="setSort('name')">Navn <span class="sort-indicator" id="sort-name"></span></th>
        <th class="sortable" onclick="setSort('spent')">Kritet <span class="sort-indicator" id="sort-spent"></span></th>
        <th class="sortable" onclick="setSort('blocked')">Svartelistet <span class="sort-indicator" id="sort-blocked"></span></th>
        <th class="sortable" onclick="setSort('gjeng')">Gjeng <span class="sort-indicator" id="sort-gjeng"></span></th>
      </tr>
    </thead>
    <tbody id="user-table">
      <!-- In Flask: {% for user in users %} <tr>...</tr> {% endfor %} -->
    </tbody>
  </table>
</div>

<div class="backup-card">
  <div class="backup-toolbar" onclick="toggleBackupList()">
    <span>Sikkerhetskopier</span>
    <span class="backup-toggle-icon" id="backup-toggle-icon">▶</span>
  </div>
  <div class="backup-list" id="backup-list"></div>
</div>

<div class="footer">
  <span>Kritebar Aqua utviklet av Kasper | Spørsmål: kaspel@samfundet.no</span>
  <span id="save-status"></span>
</div>

<script>
  let users = [];
  let dataLoaded = false;
  let currentSort = { key: null, ascending: true };
  let searchTerm = "";

  function buildTable() {
    const tbody = document.getElementById("user-table");
    tbody.innerHTML = "";

    let displayUsers = users.filter(user => user.name.toLowerCase().includes(searchTerm));
    displayUsers = displayUsers.slice();

    if (currentSort.key) {
      displayUsers.sort((a, b) => {
        const key = currentSort.key;
        let lhs = a[key];
        let rhs = b[key];

        if (key === "name") {
          lhs = String(lhs).toLowerCase();
          rhs = String(rhs).toLowerCase();
          return currentSort.ascending ? lhs.localeCompare(rhs) : rhs.localeCompare(lhs);
        }

        if (key === "spent") {
          return currentSort.ascending ? lhs - rhs : rhs - lhs;
        }

        if (key === "blocked") {
          lhs = a.blocked ? 1 : 0;
          rhs = b.blocked ? 1 : 0;
          return currentSort.ascending ? lhs - rhs : rhs - lhs;
        }

        if (key === "gjeng") {
          lhs = String(a.gjeng || "").toLowerCase();
          rhs = String(b.gjeng || "").toLowerCase();
          return currentSort.ascending ? lhs.localeCompare(rhs) : rhs.localeCompare(lhs);
        }

        return 0;
      });
    }

    displayUsers.forEach((user) => {
      const tr = document.createElement("tr");
      if (user.blocked) tr.classList.add("is-blocked");

      tr.innerHTML =
        "<td>" +
          "<div class='user-name'>" + user.name + (user.blocked ? "<span class='badge'>blocked</span>" : "") + "</div>" +
          "<div class='rfid-sub'>" + user.rfid + "</div>" +
        "</td>" +
        "<td class='spent-cell'>" + user.spent + "</td>" +
        "<td class='blocked-cell'>" +
          "<input type='checkbox' data-id='" + user.rfid + "' " + (user.blocked ? "checked" : "") + " onchange='onBlockedChange(this)'>" +
        "</td>" +
        "<td class='gjeng-cell'>" + (user.gjeng || "—") + "</td>";
      tbody.appendChild(tr);
    });
  }

  function setButtons(enabled) {
    document.getElementById("save-button").disabled = !enabled;
    document.getElementById("add-user-button").disabled = !enabled;
    document.getElementById("show-rfid-toggle").disabled = !enabled;
    document.getElementById("search-input").disabled = !enabled;
  }

  function clearSortIndicators() {
    ["name", "spent", "blocked", "gjeng"].forEach((key) => {
      document.getElementById(`sort-${key}`).textContent = "";
    });
  }

  function setSort(key) {
    if (currentSort.key === key) {
      currentSort.ascending = !currentSort.ascending;
    } else {
      currentSort.key = key;
      currentSort.ascending = true;
    }

    clearSortIndicators();
    document.getElementById(`sort-${key}`).textContent = currentSort.ascending ? "▲" : "▼";
    buildTable();
  }

  function setSearch(value) {
    searchTerm = value.toLowerCase();
    buildTable();
  }

  function updateBlockSummary() {
    const total = users.length;
    const blocked = users.filter(user => user.blocked).length;
    document.getElementById("blocked-count").textContent = blocked;
    document.getElementById("total-count").textContent = total;
  }

  async function loadData() {
    setStatus("Loading data...");
    try {
      const response = await fetch("/load", { method: "POST" });
      if (!response.ok) throw new Error(`Load failed: ${response.status}`);
      const payload = await response.json();
      users = payload.users || [];
      dataLoaded = true;
      searchTerm = "";
      document.getElementById("search-input").value = "";
      buildTable();
      setButtons(true);
      updateBlockSummary();
      document.getElementById("data-label").textContent = `users — data.csv (${users.length} rows)`;
      document.getElementById("export-link").style.display = "inline-block";
      document.getElementById("table-card").style.display = "block";
      setStatus(`Loaded ${users.length} users. Backup created: ${payload.backup}`);
    } catch (error) {
      console.error(error);
      setStatus("Unable to load data. See console.");
    }
  }

  function toggleRfid(checkbox) {
    document.getElementById("main-table").classList.toggle("show-rfid", checkbox.checked);
  }

  function onBlockedChange(checkbox) {
    const row = checkbox.closest("tr");
    row.classList.toggle("is-blocked", checkbox.checked);
    const target = users.find(user => user.rfid === checkbox.dataset.id);
    if (target) {
      target.blocked = checkbox.checked;
      updateBlockSummary();
      setStatus("Staged: " + checkbox.dataset.id + " → " + (checkbox.checked ? "blocked" : "unblocked"));
    }
  }

  async function saveBlocked() {
    if (!dataLoaded) {
      setStatus("Load the data first.");
      return;
    }

    setStatus("Saving data...");
    try {
      const response = await fetch("/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ users }),
      });
      if (!response.ok) throw new Error(`Save failed: ${response.status}`);
      const result = await response.json();
      setStatus(`Saved. Blocked: ${result.stats.blocked}, Total users: ${result.stats.total_users}`);
      document.getElementById("export-link").style.display = "none";
      document.getElementById("data-label").textContent = "Data exported";
      document.getElementById("table-card").style.display = "none";
    } catch (error) {
      console.error(error);
      setStatus("Unable to save data. See console.");
    }
  }

  function showAddUserDialog() {
    if (!dataLoaded) {
      setStatus("Load data before adding a user.");
      return;
    }
    document.getElementById("add-user-modal").classList.add("visible");
  }

  function hideAddUserDialog() {
    document.getElementById("add-user-modal").classList.remove("visible");
  }

  function submitAddUser() {
    const nameInput = document.getElementById("new-user-name");
    const rfidInput = document.getElementById("new-user-rfid");
    const gjengInput = document.getElementById("new-user-gjeng");
    const name = nameInput.value.trim();
    const rfid = rfidInput.value.trim();
    const gjeng = gjengInput.value.trim();

    if (!name || !rfid) {
      setStatus("Name and RFID are required.");
      return;
    }

    users.push({
      name,
      rfid,
      spent: 0,
      blocked: false,
      gjeng,
    });

    buildTable();
    updateBlockSummary();
    hideAddUserDialog();
    setStatus(`Added ${name}. Remember to save data.`);
    nameInput.value = "";
    rfidInput.value = "";
    gjengInput.value = "";
  }

  function setStatus(msg) {
    const el = document.getElementById("save-status");
    el.textContent = msg;
    setTimeout(() => { if (el.textContent === msg) el.textContent = ""; }, 4000);
  }

  setButtons(false);

  // --- Backup functionality ---
  let backupListOpen = false;

  async function toggleBackupList() {
    backupListOpen = !backupListOpen;
    document.getElementById("backup-list").classList.toggle("open", backupListOpen);
    document.getElementById("backup-toggle-icon").textContent = backupListOpen ? "▼" : "▶";
    if (backupListOpen) await refreshBackupList();
  }

  async function refreshBackupList() {
    const list = document.getElementById("backup-list");
    list.innerHTML = "";
    const loading = document.createElement("div");
    loading.style.cssText = "padding:1rem 1.25rem; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-faint);";
    loading.textContent = "Laster...";
    list.appendChild(loading);

    try {
      const resp = await fetch("/backups");
      const data = await resp.json();
      list.innerHTML = "";

      if (!data.backups.length) {
        const empty = document.createElement("div");
        empty.style.cssText = "padding:1rem 1.25rem; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-faint);";
        empty.textContent = "Ingen sikkerhetskopier funnet.";
        list.appendChild(empty);
        return;
      }

      data.backups.forEach(f => {
        const item = document.createElement("div");
        item.className = "backup-item";

        const name = document.createElement("span");
        name.className = "backup-item-name";
        name.textContent = f;

        const actions = document.createElement("div");
        actions.className = "backup-item-actions";

        const viewBtn = document.createElement("button");
        viewBtn.className = "btn";
        viewBtn.style.cssText = "font-size:11px; padding:3px 10px;";
        viewBtn.textContent = "Vis";
        viewBtn.addEventListener("click", () => viewBackup(f));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn btn-danger";
        deleteBtn.style.cssText = "font-size:11px; padding:3px 10px;";
        deleteBtn.textContent = "Slett";
        deleteBtn.addEventListener("click", () => deleteBackup(f));

        actions.appendChild(viewBtn);
        actions.appendChild(deleteBtn);
        item.appendChild(name);
        item.appendChild(actions);
        list.appendChild(item);
      });
    } catch (e) {
      list.innerHTML = "";
      const err = document.createElement("div");
      err.style.cssText = "padding:1rem 1.25rem; color:var(--danger); font-size:12px;";
      err.textContent = "Kunne ikke laste sikkerhetskopier.";
      list.appendChild(err);
    }
  }

  async function viewBackup(filename) {
    try {
      const resp = await fetch("/backups/" + encodeURIComponent(filename));
      if (!resp.ok) throw new Error("Failed");
      const data = await resp.json();
      users = data.users;
      dataLoaded = false;
      searchTerm = "";
      document.getElementById("search-input").value = "";
      buildTable();
      updateBlockSummary();
      document.getElementById("data-label").textContent = "users — " + filename;
      document.getElementById("save-button").disabled = true;
      document.getElementById("add-user-button").disabled = true;
      document.getElementById("show-rfid-toggle").disabled = false;
      document.getElementById("search-input").disabled = false;
      document.getElementById("viewing-banner-text").textContent = "Viser sikkerhetskopi: " + filename;
      document.getElementById("viewing-banner").classList.add("visible");
    } catch (e) {
      setStatus("Kunne ikke laste sikkerhetskopi.");
    }
  }

  async function deleteBackup(filename) {
    if (!confirm("Slett sikkerhetskopi: " + filename + "?")) return;
    try {
      const resp = await fetch("/backups/" + encodeURIComponent(filename), { method: "DELETE" });
      if (!resp.ok) throw new Error("Failed");
      setStatus("Slettet: " + filename);
      await refreshBackupList();
    } catch (e) {
      setStatus("Kunne ikke slette sikkerhetskopi.");
    }
  }

  function clearBackupView() {
    document.getElementById("viewing-banner").classList.remove("visible");
    users = [];
    dataLoaded = false;
    searchTerm = "";
    buildTable();
    updateBlockSummary();
    document.getElementById("data-label").textContent = "users — data.csv (not loaded)";
    setButtons(false);
    setStatus("Trykk 'Hent data' for å laste live data.");
  }

  // Logout functionality
  document.getElementById("logout-btn").addEventListener("click", () => {
    fetch("/logout", { method: "POST" })
      .then(() => {
        window.location.href = "/login";
      })
      .catch(err => {
        console.error("Logout failed:", err);
        window.location.href = "/login";
      });
  });
</script>

</body>
</html>
